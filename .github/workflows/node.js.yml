name: Test Coverage → Jira Gate

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

jobs:
  coverage-gate:
    # Only run when the PR is actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 3. Run Jest with coverage ──────────────────────────────────────────
      - name: Run Jest coverage
        id: jest
        # --coverage       → generate coverage report
        # --coverageReporters json-summary → outputs coverage-summary.json
        # || true          → don't fail the action on test failures here;
        #                    we report the % to Jira and let JMWE gate it
        run: npx jest --coverage --coverageReporters json-summary || true

      # ── 4. Mock Jest coverage-summary.json (remove in real usage) ──────────
      #    In production this file is generated by the step above.
      #    This step simulates a Jest output for demo purposes.
      - name: Mock coverage-summary.json
        run: |
          mkdir -p coverage
          cat > coverage/coverage-summary.json << 'EOF'
          {
            "total": {
              "lines":      { "total": 320, "covered": 275, "skipped": 0, "pct": 85.94 },
              "statements": { "total": 410, "covered": 348, "skipped": 0, "pct": 84.88 },
              "functions":  { "total": 98,  "covered": 81,  "skipped": 0, "pct": 82.65 },
              "branches":   { "total": 144, "covered": 112, "skipped": 0, "pct": 77.78 }
            }
          }
          EOF

      # ── 5. Parse coverage % ────────────────────────────────────────────────
      - name: Parse coverage percentage
        id: coverage
        run: |
          # Extract the line coverage % from the Jest summary JSON
          LINE_PCT=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          STMT_PCT=$(jq '.total.statements.pct' coverage/coverage-summary.json)
          FUNC_PCT=$(jq '.total.functions.pct' coverage/coverage-summary.json)
          BRNC_PCT=$(jq '.total.branches.pct' coverage/coverage-summary.json)

          # Use line coverage as the primary gate metric
          echo "line_pct=$LINE_PCT"       >> $GITHUB_OUTPUT
          echo "statement_pct=$STMT_PCT"  >> $GITHUB_OUTPUT
          echo "function_pct=$FUNC_PCT"   >> $GITHUB_OUTPUT
          echo "branch_pct=$BRNC_PCT"     >> $GITHUB_OUTPUT

          echo "Coverage → Lines: $LINE_PCT% | Statements: $STMT_PCT% | Functions: $FUNC_PCT% | Branches: $BRNC_PCT%"

      # ── 6. Extract Jira issue key from PR branch name or title ────────────
      - name: Extract Jira issue key
        id: jira
        run: |
          BRANCH="${{ github.head_ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          echo "Branch : $BRANCH"
          echo "PR Title: $PR_TITLE"

          # Pattern: one or more uppercase letters, a dash, one or more digits
          # e.g.  feature/PROJ-123-my-feature  →  PROJ-123
          #        bugfix/FF-456                →  FF-456
          #        "PROJ-789: Fix login crash"  →  PROJ-789
          ISSUE_KEY=$(echo "$BRANCH $PR_TITLE" \
            | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' \
            | head -n 1)

          if [ -z "$ISSUE_KEY" ]; then
            echo "::error::No Jira issue key found in branch '$BRANCH' or PR title '$PR_TITLE'."
            echo "::error::Branch naming convention required: feature/<PROJECT_KEY>-<ID>-description"
            exit 1
          fi

          echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
          echo "Detected Jira issue: $ISSUE_KEY"

      # ── 7. Send payload to JMWE webhook ────────────────────────────────────
      - name: POST coverage data to JMWE webhook
        id: jmwe
        env:
          JMWE_WEBHOOK_URL: ${{ secrets.JMWE_WEBHOOK_URL }}
          # JMWE_WEBHOOK_URL format:
          #   https://<your-site>.atlassian.net/rest/scriptrunner/latest/listener/<uuid>
          # or via JMWE's built-in HTTP listener endpoint.
          # Store the full URL (including any auth token) as a GitHub secret.
        run: |
          ISSUE_KEY="${{ steps.jira.outputs.issue_key }}"
          LINE_PCT="${{ steps.coverage.outputs.line_pct }}"
          STMT_PCT="${{ steps.coverage.outputs.statement_pct }}"
          FUNC_PCT="${{ steps.coverage.outputs.function_pct }}"
          BRNC_PCT="${{ steps.coverage.outputs.branch_pct }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          COMMIT_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"

          # Build the JSON payload
          PAYLOAD=$(jq -n \
            --arg issueKey    "$ISSUE_KEY" \
            --argjson linePct  "$LINE_PCT" \
            --argjson stmtPct  "$STMT_PCT" \
            --argjson funcPct  "$FUNC_PCT" \
            --argjson brncPct  "$BRNC_PCT" \
            --arg prUrl       "$PR_URL" \
            --arg prTitle     "$PR_TITLE" \
            --arg commitSha   "$COMMIT_SHA" \
            --arg repo        "$REPO" \
            --arg mergedBy    "$ACTOR" \
            '{
              issueKey:        $issueKey,
              testCoverage: {
                lines:      $linePct,
                statements: $stmtPct,
                functions:  $funcPct,
                branches:   $brncPct
              },
              pullRequest: {
                url:      $prUrl,
                title:    $prTitle,
                commitSha: $commitSha,
                repo:     $repo,
                mergedBy: $mergedBy
              },
              source: "github-actions-jest"
            }')

          echo "Payload:"
          echo "$PAYLOAD" | jq .

          # POST to JMWE
          HTTP_STATUS=$(curl -s -o /tmp/jmwe_response.json -w "%{http_code}" \
            -X POST "$JMWE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "JMWE response (HTTP $HTTP_STATUS):"
          cat /tmp/jmwe_response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::JMWE webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Coverage data successfully sent to Jira issue $ISSUE_KEY"

      # ── 8. Post a PR summary comment ───────────────────────────────────────
      - name: Comment coverage summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const issueKey  = '${{ steps.jira.outputs.issue_key }}';
            const linePct   = '${{ steps.coverage.outputs.line_pct }}';
            const stmtPct   = '${{ steps.coverage.outputs.statement_pct }}';
            const funcPct   = '${{ steps.coverage.outputs.function_pct }}';
            const brncPct   = '${{ steps.coverage.outputs.branch_pct }}';
            const jiraBase  = 'https://fireflydemo26.atlassian.net/browse';

            const emoji = (pct) => parseFloat(pct) >= 80 ? '✅' : parseFloat(pct) >= 60 ? '⚠️' : '❌';

            const body = `## 🧪 Jest Coverage Report — [${issueKey}](${jiraBase}/${issueKey})

            | Metric      | Coverage | Status |
            |-------------|----------|--------|
            | Lines       | ${linePct}%  | ${emoji(linePct)}  |
            | Statements  | ${stmtPct}%  | ${emoji(stmtPct)}  |
            | Functions   | ${funcPct}%  | ${emoji(funcPct)}  |
            | Branches    | ${brncPct}%  | ${emoji(brncPct)}  |

            Coverage data has been sent to Jira. The JMWE validator on **${issueKey}** will enforce the threshold before allowing transition to _Ready for Release_.

            > Thresholds: ✅ ≥ 80% &nbsp;|&nbsp; ⚠️ ≥ 60% &nbsp;|&nbsp; ❌ < 60%`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
